name: betbot

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: betbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-betbot_dev_pwd}
      POSTGRES_DB: betbot
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betbot -d betbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"   # bind to localhost only — never expose Postgres publicly

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    image: betbot:latest
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://betbot:${POSTGRES_PASSWORD:-betbot_dev_pwd}@db:5432/betbot
      LOG_PATH: ""
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  worker:
    build: .
    image: betbot:latest
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://betbot:${POSTGRES_PASSWORD:-betbot_dev_pwd}@db:5432/betbot
      LOG_PATH: ""
      REDIS_URL: redis://redis:6379/0
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - betbot_data:/app/data
    restart: unless-stopped
    command: ["python", "-m", "betbot.main"]
    stop_grace_period: 30s
    healthcheck:
      # Deep healthcheck: probes the embedded HTTP server in the worker
      # process (started by start_health_server in betbot.worker_health).
      # Returns 503 if scheduler is down or no job has fired in 25h.
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; urllib.request.urlopen('http://localhost:8001/').read(); sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    image: betbot:latest
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://betbot:${POSTGRES_PASSWORD:-betbot_dev_pwd}@db:5432/betbot
      LOG_PATH: ""
      REDIS_URL: redis://redis:6379/0
    # NOTE: The API still needs to write here for the manual refresh endpoints
    # (/tennis/refresh, /basketball/refresh, /ml/calibrator/train). The joblib
    # pickle-RCE risk that motivated locking this down has been eliminated by
    # switching the calibrator to JSON serialization (see betbot/ml.py).
    # Tennis ELO and basketball stats are also JSON, so a malicious write here
    # can only produce wrong predictions, never code execution.
    volumes:
      - betbot_data:/app/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    command: ["uvicorn", "betbot_api.main:app", "--host", "0.0.0.0", "--port", "8000",
              "--workers", "2", "--access-log", "--no-server-header"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: .
    image: betbot:latest
    depends_on:
      - api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://betbot:${POSTGRES_PASSWORD:-betbot_dev_pwd}@db:5432/betbot
      LOG_PATH: ""
      BETBOT_API_URL: http://api:8000
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    command: ["streamlit", "run", "betbot_dashboard/app.py",
              "--server.port=8501", "--server.address=0.0.0.0",
              "--browser.gatherUsageStats=false"]

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-betbot_dev_pwd}
      PG_HOST: db
      PG_USER: betbot
      PG_DB: betbot
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      # Offsite backups (optional). Set BACKUP_REMOTE_TARGET to a valid rclone
      # destination (e.g. "myremote:bucket/betbot") and mount a populated
      # rclone.conf below to activate. Empty = local-only backups.
      BACKUP_REMOTE_TARGET: ${BACKUP_REMOTE_TARGET:-}
      BACKUP_REMOTE_RETENTION_DAYS: ${BACKUP_REMOTE_RETENTION_DAYS:-}
    volumes:
      - ./scripts/backup_db.sh:/usr/local/bin/backup_db.sh:ro
      - ./backups:/backups
      # Read-only mount of the shared data volume so we can tar tennis ELO,
      # basketball stats, and the ML calibrator alongside the Postgres dump.
      - betbot_data:/app/data:ro
      # To enable offsite backups, create a docker-compose.override.yml with:
      #   services:
      #     backup:
      #       volumes:
      #         - ~/.config/rclone/rclone.conf:/root/.config/rclone/rclone.conf:ro
      # and set BACKUP_REMOTE_TARGET in .env. See .env.example for details.
    entrypoint: ["sh", "-c"]
    # Daily backup at 03:00 UTC (low-activity hour for European football).
    # Loop: compute seconds until next 03:00 UTC using pure busybox-portable
    # shell arithmetic — `date -d "today 03:00"` is GNU-only and silently
    # produces a negative sleep on Alpine, which causes a tight loop. The
    # current approach is portable and verifiable.
    command:
      - |
        # Install rclone for optional offsite backup (BACKUP_REMOTE_TARGET).
        # ~14MB; idempotent — apk add --no-cache is fast on re-runs.
        if [ -n "$$BACKUP_REMOTE_TARGET" ] && ! command -v rclone >/dev/null 2>&1; then
          echo "[backup] Installing rclone for offsite backups…"
          apk add --no-cache rclone >/dev/null 2>&1 || echo "[backup] rclone install failed — offsite disabled"
        fi
        chmod +x /usr/local/bin/backup_db.sh
        echo "[backup] Daemon started — will run at 03:00 UTC daily"
        target_hour=3
        while true; do
          # Seconds since UTC midnight → seconds until next 03:00 UTC.
          secs_today=$$(( $$(date -u +%H) * 3600 + $$(date -u +%M) * 60 + $$(date -u +%S) ))
          target_secs=$$(( target_hour * 3600 ))
          if [ "$$secs_today" -lt "$$target_secs" ]; then
            sleep_for=$$(( target_secs - secs_today ))
          else
            sleep_for=$$(( 86400 - secs_today + target_secs ))
          fi
          echo "[backup] Sleeping $${sleep_for}s until next run (UTC $$(date -u +%Y-%m-%dT%H:%M:%S))"
          sleep "$$sleep_for"
          /usr/local/bin/backup_db.sh || echo "[backup] Run failed — will retry tomorrow"
        done

volumes:
  db_data:
  redis_data:
  betbot_data:    # shared writable area for tennis ELO, ML calibrator, etc.
