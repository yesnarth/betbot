# =============================================================================
# BetBot — server block à AJOUTER au nginx PARTAGÉ du VPS ESARTH
#   Fichier cible : /home/ubuntu/nginx-proxy/nginx.conf   (à coller dans http{})
# =============================================================================
# Calqué à l'identique sur le bloc mytrader (trade.rboost.link) déjà en prod,
# adapté pour Streamlit (WebSocket persistant → read_timeout long).
#
# Procédure (zéro downtime — cf. DEPLOY_VPS_ESARTH.md) :
#   1. La stack BetBot doit être UP et betbot-dashboard-prod joignable par nginx
#      AVANT d'ajouter ce bloc (règle d'or : un upstream mort fait tomber les 8 sites).
#   2. Le cert doit exister : /etc/nginx/certs/pronos-rboost/{fullchain,privkey}.pem
#   3. Le htpasswd doit exister : /etc/nginx/certs/htpasswd-pronos
#   4. Valider PUIS recharger :
#        docker exec esarth-nginx-prod nginx -t
#        docker exec esarth-nginx-prod nginx -s reload
#
# Remplace `pronos.rboost.link` par ton sous-domaine réel (DNS A → 91.134.240.150).
# =============================================================================

    server {
        listen 80;
        listen [::]:80;
        server_name pronos.rboost.link;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name pronos.rboost.link;

        ssl_certificate     /etc/nginx/certs/pronos-rboost/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/pronos-rboost/privkey.pem;

        # Authentification : Streamlit n'a AUCUNE auth native et le dashboard peut
        # placer/régler des paris (actions argent) → protégé par nginx Basic Auth.
        auth_basic           "BetBot";
        auth_basic_user_file /etc/nginx/certs/htpasswd-pronos;

        add_header X-Frame-Options          "SAMEORIGIN"        always;
        add_header X-Content-Type-Options   "nosniff"           always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 20M;

        location / {
            proxy_pass         http://betbot-dashboard-prod:8501;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_cache_bypass $http_upgrade;

            # Streamlit garde un WebSocket ouvert (/_stcore/stream) → timeout long,
            # sinon l'UI se fige sur "Connecting…" après ~60s d'inactivité.
            proxy_buffering    off;
            proxy_connect_timeout 60s;
            proxy_send_timeout    86400s;
            proxy_read_timeout    86400s;
        }
    }
