name: betbot

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: betbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-betbot_dev_pwd}
      POSTGRES_DB: betbot
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betbot -d betbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"   # bind to localhost only — never expose Postgres publicly

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    image: betbot:latest
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://betbot:${POSTGRES_PASSWORD:-betbot_dev_pwd}@db:5432/betbot
      LOG_PATH: ""
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  worker:
    build: .
    image: betbot:latest
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://betbot:${POSTGRES_PASSWORD:-betbot_dev_pwd}@db:5432/betbot
      LOG_PATH: ""
      REDIS_URL: redis://redis:6379/0
      TZ: ${TZ:-Europe/Paris}
    restart: unless-stopped
    command: ["python", "-m", "betbot.main"]
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    image: betbot:latest
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://betbot:${POSTGRES_PASSWORD:-betbot_dev_pwd}@db:5432/betbot
      LOG_PATH: ""
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    command: ["uvicorn", "betbot_api.main:app", "--host", "0.0.0.0", "--port", "8000",
              "--workers", "2", "--access-log", "--no-server-header"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: .
    image: betbot:latest
    depends_on:
      - api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://betbot:${POSTGRES_PASSWORD:-betbot_dev_pwd}@db:5432/betbot
      LOG_PATH: ""
      BETBOT_API_URL: http://api:8000
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    command: ["streamlit", "run", "betbot_dashboard/app.py",
              "--server.port=8501", "--server.address=0.0.0.0",
              "--browser.gatherUsageStats=false"]

volumes:
  db_data:
  redis_data:
