# Production overlay — adds Caddy reverse proxy with HTTPS, removes the
# 127.0.0.1 port bindings from the dev compose so only Caddy is internet-facing.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env vars in .env:
#   BETBOT_DOMAIN       — your domain pointing at the server (A record)
#   ACME_EMAIL          — for Let's Encrypt notifications
#   POSTGRES_PASSWORD   — strong random value
#   API_BASIC_PASSWORD  — strong random value (enables HTTP Basic on the API)
#   ANTHROPIC_API_KEY   — to enable the AI agent (optional)

services:
  db:
    # Don't expose Postgres on the host in prod — only the compose network.
    ports: !reset []

  redis:
    ports: !reset []

  api:
    ports: !reset []
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    ports: !reset []
    restart: unless-stopped

  worker:
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep 'python -m betbot.main' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      BETBOT_DOMAIN: ${BETBOT_DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}

volumes:
  caddy_data:
  caddy_config:
